name: Maven CI Pipeline

on:
  workflow_dispatch:
    inputs:
      hdf4_version:
        description: 'HDF4 version to use (leave empty for latest release)'
        type: string
        required: false
        default: ''
      hdf5_version:
        description: 'HDF5 version to use'
        type: string
        required: false
        default: '2.0.0'
  push:
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ci-linux:
    name: CI - Linux
    uses: ./.github/workflows/ci-linux.yml
    with:
      hdf4_version: ${{ inputs.hdf4_version || '' }}
      hdf5_version: ${{ inputs.hdf5_version || '2.0.0' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

  ci-windows:
    name: CI - Windows
    uses: ./.github/workflows/ci-windows.yml
    with:
      hdf4_version: ${{ inputs.hdf4_version || '' }}
      hdf5_version: ${{ inputs.hdf5_version || '2.0.0' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

  ci-macos:
    name: CI - macOS
    uses: ./.github/workflows/ci-macos.yml
    with:
      hdf4_version: ${{ inputs.hdf4_version || '' }}
      hdf5_version: ${{ inputs.hdf5_version || '2.0.0' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ci-linux, ci-windows, ci-macos]
    if: always()

    steps:
    - name: Check Results
      run: |
        echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linux    | ${{ needs.ci-linux.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows  | ${{ needs.ci-windows.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS    | ${{ needs.ci-macos.result }} |" >> $GITHUB_STEP_SUMMARY

        # Fail if any platform failed
        if [ "${{ needs.ci-linux.result }}" != "success" ] || \
           [ "${{ needs.ci-windows.result }}" != "success" ] || \
           [ "${{ needs.ci-macos.result }}" != "success" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ One or more platforms failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All platforms passed" >> $GITHUB_STEP_SUMMARY
        fi
